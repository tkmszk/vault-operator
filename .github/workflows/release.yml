name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0 — must match manifest.json)'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install --no-audit --no-fund
          npm install @rollup/rollup-linux-x64-gnu --no-audit --no-fund --no-save

      - name: Build plugin
        run: node esbuild.config.mjs production

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp main.js manifest.json styles.css release-assets/

          # Optional assets (Phase 2) -- downloaded on demand by users
          # via Settings, never auto-installed. Shipped here so the
          # OptionalAssetManager has a stable per-version URL to pull.
          if [ -f "node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.wasm" ]; then
            cp node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.wasm release-assets/
          fi
          if [ -f "plugin-source.json" ]; then
            cp plugin-source.json release-assets/
          fi

          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Verify build output
        run: |
          ls -lh release-assets/main.js release-assets/manifest.json release-assets/styles.css
          echo "manifest version: $(jq -r .version release-assets/manifest.json)"
          echo "Optional assets:"
          for f in ort-wasm-simd-threaded.wasm plugin-source.json; do
            if [ -f "release-assets/$f" ]; then
              echo "  $f  $(ls -lh release-assets/$f | awk '{print $5}')  sha256=$(shasum -a 256 release-assets/$f | cut -d' ' -f1)"
            fi
          done

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release-assets/main.js
            release-assets/styles.css
            release-assets/ort-wasm-simd-threaded.wasm
            release-assets/plugin-source.json

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: |
            ## Vault Operator v${{ inputs.version }}

            Install via [BRAT](https://github.com/TfTHacker/obsidian42-brat):
            1. Install BRAT from Community Plugins
            2. BRAT → Add Beta Plugin → `https://github.com/pssah4/vault-operator`

            Or install manually:
            1. Download `main.js`, `manifest.json`, `styles.css` into `.obsidian/plugins/vault-operator/`
            2. Reload Obsidian
          files: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css
            release-assets/ort-wasm-simd-threaded.wasm
            release-assets/plugin-source.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
